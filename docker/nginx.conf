map $http_user_agent $social_preview {
  default 0;
  ~*(facebookexternalhit|Facebot|WhatsApp|LinkedInBot|Slackbot|Twitterbot|TelegramBot|Pinterest) 1;
}

server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:3031/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Crawlers (WhatsApp, etc.) não executam JS: devolvem HTML com og:* na primeira resposta.
  location ~ ^/produto/(?<p_slug>[^/]+)/?$ {
    if ($social_preview = 1) {
      rewrite ^ /__social/$p_slug last;
    }
    try_files $uri /index.html;
  }

  location ~ ^/__social/(?<p_slug>[^/]+)$ {
    internal;
    proxy_pass http://api:3031/internal/social-pdp/$p_slug;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
