services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3031:3031"
    environment:
      PORT: "3031"
      # URL pública do site (https) para og:url/canonical nas previews WhatsApp; se omitir, usa Host do proxy.
      # PUBLIC_SITE_URL: "https://seu-dominio.com"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      - api
