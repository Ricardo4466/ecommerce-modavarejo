<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="StyleWare — vitrine de moda e varejo com filtros por categoria, marca e condição comercial."
    />
    <meta name="theme-color" content="#14120f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=optional"
      rel="stylesheet"
    />
    <title>StyleWare — Moda e varejo</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('theme-preference')
          var pref = 'light'
          if (raw) {
            var parsed = JSON.parse(raw)
            if (parsed && parsed.state && parsed.state.preference) {
              pref = parsed.state.preference
            }
          }
          var html = document.documentElement
          html.classList.remove('dark')
          if (pref === 'dark') html.classList.add('dark')
          else if (
            pref === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          ) {
            html.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
